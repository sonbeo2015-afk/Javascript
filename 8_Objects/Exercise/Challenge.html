<!DOCTYPE html>
<html>

<head></head>

<body>
  <button onclick="playGame('heads')">heads</button>
  <button onclick="playGame('tails')">tails</button>
  <button onclick="reset()">Reset score</button>
  <script>
    const score = JSON.parse(localStorage.getItem('score')) || {
      wins: 0,
      loses: 0
    };

    function playGame(guess) {
      const randomNumber = Math.random();
      const result = randomNumber < 0.5 ? 'heads' : 'tails';
      alert(guess === result ? (++score.wins, `You win\n\nWins: ${score.wins}\nLoses: ${score.loses}`) : (++score.loses,
        `You loses\n\nWins: ${score.wins}\nLoses: ${score.loses}`));

      localStorage.setItem('score', JSON.stringify(score));
    }

    function reset() {
      score.wins = 0;
      score.loses = 0;
      alert(`Game score has been reset\n\nWins: ${score.wins}\nLoses: ${score.loses}`);
      localStorage.setItem('score', JSON.stringify(score));
    }
  </script>
</body>

</html>
