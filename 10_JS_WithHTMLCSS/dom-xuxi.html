<!doctype html>
<html>

<head>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="dom-xuxi.css">
</head>

<body>
  <p class="title">Rock Paper Scissors</p>
  <button onclick="playGame('rock')">
    <img class="move-icons" src="icons/rock-emoji.png" alt="" />
  </button>

  <button onclick="playGame('paper')">
    <img class="move-icons" src="icons/paper-emoji.png" alt="" />
  </button>

  <button onclick="playGame('scissors')">
    <img class="move-icons" src="icons/scissors-emoji.png" alt="" />
  </button>
  <p class="js-result" style="font-weight: bold;"></p>
  <p class="js-moves">
  </p>
  <p class="js-score"></p>

  <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScore();
        document.querySelector('.js-moves').innerHTML = '';
        document.querySelector('.js-result').innerHTML = '';
      ">
    Reset Score
  </button>

  <script src="dom-xuxi.js">
  </script>
</body>

</html>
