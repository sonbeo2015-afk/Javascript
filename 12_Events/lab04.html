<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrong-input {
            border: 1px solid red;
        }
    </style>
</head>

<body>
    <input type="text" name="" id="username">
    <input type="text" name="" id="password">
    <button id="btn">Đăng nhập</button>
    <script>
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const signinBtn = document.getElementById("btn");
        const check = () => {
            if (usernameInput.value === "admin" && passwordInput.value === "123456") {
                alert("success");
                window.location.href = "success.html";
            } else {
                alert("unsuccess");
                if (usernameInput.value != "admin") usernameInput.classList.add("wrong-input")
                if (passwordInput.value != "123456") passwordInput.classList.add("wrong-input")
            }
        }
        signinBtn.addEventListener("click", check)
    </script>
</body>

</html>
