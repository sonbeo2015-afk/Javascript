<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip Game</title>
</head>
<body>
    <button onclick="playGame('heads')">Heads</button>
    <button onclick="playGame('tails')">Tails</button>

    <script>
        function playGame(userChoice) {
            const randomNumber = Math.random();
            
            const result = randomNumber < 0.5 ? 'heads' : 'tails';

            userChoice === result ? alert(`Random number is: ${randomNumber.toFixed(2)}\nResult is: ${result}\nYou WIN!`) : alert(`Random number is: ${randomNumber.toFixed(2)}\nResult is: ${result}\nYou LOSE!`);
        }
    </script>
</body>
</html>
