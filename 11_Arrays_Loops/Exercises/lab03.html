<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const product1 = {
            name: 'san pham 1',
            price: 200,
            inStock: true,
        }
        const product2 = {
            name: 'product2',
            price: 500,
            inStock: false,
        }
        const product3 = {
            name: 'product3',
            price: 350,
            inStock: true,
        }
        const product4 = {
            name: 'product4',
            price: 150,
            inStock: true,
        }
        const product5 = {
            name: 'product5',
            price: 400,
            inStock: false,
        }
        const products = [product1, product2, product3, product4, product5];
        console.log(products[0].name);
        products[1].price = 150;
        console.log(products);
        products.pop();
        console.log(products);
        products.forEach(element => {
            console.log(element.name)
        });
        const product_price = products.map((element)=>{
            return element.price
        })
        console.log(product_price)
        const inStock_product = products.filter((element)=>{
            return element.inStock === true
        })
        console.log(inStock_product)
        for(let key in products[0]){
            console.log(key, products[0][key])
        }
        for(let value of Object.values(products[0])){
            console.log(value)
        }
        for(let [key, value] of Object.entries(products[0])){
            console.log(key, ":", value)
        }
    </script>
</body>
</html>
