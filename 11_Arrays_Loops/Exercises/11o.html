<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 11o
        function findSearch(arr) {
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] === 'search') return i;
            }
            return -1;
        }

        function findWord(arr, word) {
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] === word) return i;
            }
            return -1;
        }

        console.log(findWord(['hello', 'world', 'search', 'good', 'search'], 'good'));
        console.log(findSearch(['not', 'found']));

        // 11r
        function removeSearch(arr) {
            let result = [];
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] != 'search') result.push(arr[i]);
            }
            return result;
        }
        console.log(removeSearch(['hello', 'world', 'search', 'good', 'search']));

        // 11s
        function removeSearch2(arr) {
            let result = [],
                count_search = 0;
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] === 'search' && count_search < 2) {
                    count_search++;
                    continue;
                }
                result.push(arr[i]);
            }
            return result;
        }
        console.log(removeSearch2(['hello', 'world', 'search', 'search', 'good', 'search']));
        // 11t
        function removeSearch2_reverse(arr) {
            let result = [],
                count_search = 0;
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] === 'search' && count_search < 2) {
                    count_search++;
                    continue;
                }
                result.push(arr[i]);
            }
            return result.reverse();
        }
        console.log(removeSearch2_reverse(['hello', 'world', 'search', 'search', 'good', 'search']));
    </script>
</body>

</html>
